spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: wallpaper-backend
  docker:
    compose:
      enabled: ${SPRING_DOCKER_COMPOSE_ENABLED:false}
  datasource:
    url: "jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai"
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Shanghai
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_FILE_SIZE}
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE}

server:
  port: ${SERVER_PORT}
  servlet:
    encoding:
      charset: UTF-8
      force: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

app:
  security:
    allowed-origins: ${APP_ALLOWED_ORIGINS}
    development-token: ${APP_SECURITY_DEVELOPMENT_TOKEN}
  storage:
    endpoint: ${RUSTFS_ENDPOINT}
    region: ${RUSTFS_REGION}
    access-key: ${RUSTFS_ACCESS_KEY}
    secret-key: ${RUSTFS_SECRET_KEY}
    bucket-original: ${RUSTFS_BUCKET_ORIGINAL}
    bucket-preview: ${RUSTFS_BUCKET_PREVIEW}
    bucket-thumbnail: ${RUSTFS_BUCKET_THUMBNAIL}
    bucket-watermark: ${RUSTFS_BUCKET_WATERMARK}
    bucket-audit: ${RUSTFS_BUCKET_AUDIT}
