spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: wallpaper-backend
  docker:
    compose:
      enabled: ${SPRING_DOCKER_COMPOSE_ENABLED:false}
  datasource:
    url: "jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai"
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD:}
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_FILE_SIZE}
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE}

server:
  port: ${SERVER_PORT}
  servlet:
    encoding:
      charset: UTF-8
      force: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

app:
  bootstrap:
    admin-password: ${APP_BOOTSTRAP_ADMIN_PASSWORD:}
    demo-users-enabled: ${APP_BOOTSTRAP_DEMO_USERS_ENABLED:true}
  security:
    allowed-origins: ${APP_ALLOWED_ORIGINS}
    development-token: ${APP_SECURITY_DEVELOPMENT_TOKEN}
    development-token-enabled: ${APP_SECURITY_DEVELOPMENT_TOKEN_ENABLED:false}
    jwt-secret: ${APP_SECURITY_JWT_SECRET}
    access-token-ttl: ${APP_SECURITY_ACCESS_TOKEN_TTL:15m}
    refresh-token-ttl: ${APP_SECURITY_REFRESH_TOKEN_TTL:7d}
  mail:
    enabled: ${APP_MAIL_ENABLED:false}
    host: ${APP_MAIL_HOST:localhost}
    port: ${APP_MAIL_PORT:25}
    username: ${APP_MAIL_USERNAME:}
    password: ${APP_MAIL_PASSWORD:}
    smtp-auth: ${APP_MAIL_SMTP_AUTH:false}
    smtp-starttls: ${APP_MAIL_SMTP_STARTTLS:false}
    smtp-ssl: ${APP_MAIL_SMTP_SSL:false}
    from: ${APP_MAIL_FROM:no-reply@example.local}
    frontend-base-url: ${APP_MAIL_FRONTEND_BASE_URL:http://localhost:5173}
    password-reset-token-ttl: ${APP_MAIL_PASSWORD_RESET_TOKEN_TTL:30m}
  storage:
    endpoint: ${RUSTFS_ENDPOINT}
    region: ${RUSTFS_REGION}
    access-key: ${RUSTFS_ACCESS_KEY}
    secret-key: ${RUSTFS_SECRET_KEY}
    bucket-original: ${RUSTFS_BUCKET_ORIGINAL}
    bucket-preview: ${RUSTFS_BUCKET_PREVIEW}
    bucket-thumbnail: ${RUSTFS_BUCKET_THUMBNAIL}
    bucket-watermark: ${RUSTFS_BUCKET_WATERMARK}
    bucket-audit: ${RUSTFS_BUCKET_AUDIT}

mybatis-plus:
  global-config:
    banner: false
    enable-sql-runner: false
    db-config:
      id-type: input
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumTypeHandler
