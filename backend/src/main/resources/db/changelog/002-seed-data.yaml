  - changeSet:
      id: 002-seed-categories-and-tags
      author: codex
      changes:
        - insert:
            tableName: categories
            columns:
              - column: { name: id, value: "10000000-0000-0000-0000-000000000001" }
              - column: { name: code, value: "TEXTILE_DEFECT" }
              - column: { name: name, value: "纺织瑕疵" }
              - column: { name: sort_order, valueNumeric: 10 }
              - column: { name: enabled, valueBoolean: true }
              - column: { name: created_at, valueDate: "2026-04-24T00:00:00" }
              - column: { name: updated_at, valueDate: "2026-04-24T00:00:00" }
        - loadData:
            tableName: tags
            file: db/changelog/seed/textile-defect-tags.csv
            encoding: UTF-8

