databaseChangeLog:
  - changeSet:
      id: 001-create-password-reset-tokens
      author: codex
      changes:
        - createTable:
            tableName: password_reset_tokens
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: varchar(36)
                  constraints:
                    nullable: false
              - column:
                  name: token_hash
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: datetime(6)
                  constraints:
                    nullable: false
              - column:
                  name: used_at
                  type: datetime(6)
              - column:
                  name: request_ip
                  type: varchar(64)
              - column:
                  name: user_agent
                  type: varchar(512)
              - column:
                  name: created_at
                  type: datetime(6)
                  defaultValueComputed: CURRENT_TIMESTAMP(6)
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: datetime(6)
                  defaultValueComputed: CURRENT_TIMESTAMP(6)
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: password_reset_tokens
            columnNames: token_hash
            constraintName: uk_password_reset_tokens_hash
        - createIndex:
            tableName: password_reset_tokens
            indexName: idx_password_reset_tokens_user_expires
            columns:
              - column: { name: user_id }
              - column: { name: expires_at }
        - addForeignKeyConstraint:
            baseTableName: password_reset_tokens
            baseColumnNames: user_id
            constraintName: fk_password_reset_tokens_user
            referencedTableName: app_users
            referencedColumnNames: id
