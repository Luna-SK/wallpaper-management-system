databaseChangeLog:
  - changeSet:
      id: 001-create-image-interactions
      author: codex
      changes:
        - createTable:
            tableName: image_comments
            columns:
              - column: { name: id, type: varchar(36), constraints: { primaryKey: true, nullable: false } }
              - column: { name: image_id, type: varchar(36), constraints: { nullable: false } }
              - column: { name: user_id, type: varchar(36), constraints: { nullable: false } }
              - column: { name: content, type: varchar(1000), constraints: { nullable: false } }
              - column: { name: status, type: varchar(24), defaultValue: ACTIVE, constraints: { nullable: false } }
              - column: { name: created_at, type: datetime(6), constraints: { nullable: false } }
              - column: { name: updated_at, type: datetime(6), constraints: { nullable: false } }
        - createIndex:
            tableName: image_comments
            indexName: idx_image_comments_image_status_created
            columns:
              - column: { name: image_id }
              - column: { name: status }
              - column: { name: created_at }
        - createTable:
            tableName: image_favorites
            columns:
              - column: { name: id, type: varchar(36), constraints: { primaryKey: true, nullable: false } }
              - column: { name: image_id, type: varchar(36), constraints: { nullable: false } }
              - column: { name: user_id, type: varchar(36), constraints: { nullable: false } }
              - column: { name: created_at, type: datetime(6), constraints: { nullable: false } }
        - addUniqueConstraint:
            tableName: image_favorites
            columnNames: user_id, image_id
            constraintName: uk_image_favorites_user_image
        - createIndex:
            tableName: image_favorites
            indexName: idx_image_favorites_image
            columns:
              - column: { name: image_id }
        - createTable:
            tableName: image_likes
            columns:
              - column: { name: id, type: varchar(36), constraints: { primaryKey: true, nullable: false } }
              - column: { name: image_id, type: varchar(36), constraints: { nullable: false } }
              - column: { name: user_id, type: varchar(36), constraints: { nullable: false } }
              - column: { name: created_at, type: datetime(6), constraints: { nullable: false } }
        - addUniqueConstraint:
            tableName: image_likes
            columnNames: user_id, image_id
            constraintName: uk_image_likes_user_image
        - createIndex:
            tableName: image_likes
            indexName: idx_image_likes_image
            columns:
              - column: { name: image_id }

  - changeSet:
      id: 002-create-user-feedback
      author: codex
      changes:
        - createTable:
            tableName: user_feedback
            columns:
              - column: { name: id, type: varchar(36), constraints: { primaryKey: true, nullable: false } }
              - column: { name: user_id, type: varchar(36), constraints: { nullable: false } }
              - column: { name: image_id, type: varchar(36) }
              - column: { name: type, type: varchar(40), defaultValue: GENERAL, constraints: { nullable: false } }
              - column: { name: title, type: varchar(160), constraints: { nullable: false } }
              - column: { name: content, type: varchar(2000), constraints: { nullable: false } }
              - column: { name: status, type: varchar(24), defaultValue: OPEN, constraints: { nullable: false } }
              - column: { name: response, type: varchar(2000) }
              - column: { name: handled_by, type: varchar(36) }
              - column: { name: handled_at, type: datetime(6) }
              - column: { name: created_at, type: datetime(6), constraints: { nullable: false } }
              - column: { name: updated_at, type: datetime(6), constraints: { nullable: false } }
        - createIndex:
            tableName: user_feedback
            indexName: idx_user_feedback_user_created
            columns:
              - column: { name: user_id }
              - column: { name: created_at }
        - createIndex:
            tableName: user_feedback
            indexName: idx_user_feedback_status_created
            columns:
              - column: { name: status }
              - column: { name: created_at }

  - changeSet:
      id: 003-add-interaction-permission
      author: codex
      changes:
        - insert:
            tableName: permissions
            columns:
              - column: { name: id, value: "20000000-0000-0000-0000-000000000012" }
              - column: { name: code, value: "interaction:manage" }
              - column: { name: name, value: "互动反馈管理" }
              - column: { name: resource, value: "interaction" }
              - column: { name: action, value: "manage" }
        - sql:
            splitStatements: true
            sql: |
              INSERT IGNORE INTO role_permissions (role_id, permission_id)
              VALUES
                ('00000000-0000-0000-0000-000000000001', '20000000-0000-0000-0000-000000000012'),
                ('00000000-0000-0000-0000-000000000002', '20000000-0000-0000-0000-000000000012');

  - changeSet:
      id: 004-add-interaction-foreign-keys
      author: codex
      changes:
        - addForeignKeyConstraint:
            baseTableName: image_comments
            baseColumnNames: image_id
            constraintName: fk_image_comments_image
            referencedTableName: images
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: image_comments
            baseColumnNames: user_id
            constraintName: fk_image_comments_user
            referencedTableName: app_users
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: image_favorites
            baseColumnNames: image_id
            constraintName: fk_image_favorites_image
            referencedTableName: images
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: image_favorites
            baseColumnNames: user_id
            constraintName: fk_image_favorites_user
            referencedTableName: app_users
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: image_likes
            baseColumnNames: image_id
            constraintName: fk_image_likes_image
            referencedTableName: images
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: image_likes
            baseColumnNames: user_id
            constraintName: fk_image_likes_user
            referencedTableName: app_users
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: user_feedback
            baseColumnNames: user_id
            constraintName: fk_user_feedback_user
            referencedTableName: app_users
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: user_feedback
            baseColumnNames: image_id
            constraintName: fk_user_feedback_image
            referencedTableName: images
            referencedColumnNames: id
