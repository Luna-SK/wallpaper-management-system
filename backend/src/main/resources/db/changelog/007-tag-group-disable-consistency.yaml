databaseChangeLog:
  - changeSet:
      id: 001-disable-tags-under-disabled-groups
      author: codex
      changes:
        - sql:
            dbms: mysql
            sql: |
              update tags tag
              join tag_groups tag_group on tag_group.id = tag.group_id
              set tag.enabled = false,
                  tag.updated_at = now(6)
              where tag_group.enabled = false
                and tag.enabled = true;
