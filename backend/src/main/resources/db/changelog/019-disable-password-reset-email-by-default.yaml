databaseChangeLog:
  - changeSet:
      id: 001-disable-password-reset-email-by-default
      author: codex
      changes:
        - sql:
            splitStatements: false
            sql: |
              INSERT INTO system_settings (setting_key, setting_value, updated_at)
              VALUES ('password_reset.email.enabled', 'false', CURRENT_TIMESTAMP(6))
              ON DUPLICATE KEY UPDATE
                setting_value = 'false',
                updated_at = CURRENT_TIMESTAMP(6);
