databaseChangeLog:
  - changeSet:
      id: 001-add-comment-thread-columns
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - onError: HALT
        - sqlCheck:
            expectedResult: "0"
            sql: |
              SELECT COUNT(*)
              FROM information_schema.columns
              WHERE table_schema = DATABASE()
                AND table_name = 'image_comments'
                AND column_name = 'parent_comment_id'
      changes:
        - addColumn:
            tableName: image_comments
            columns:
              - column: { name: parent_comment_id, type: varchar(36) }
              - column: { name: root_comment_id, type: varchar(36) }
              - column:
                  name: depth
                  type: int
                  defaultValueNumeric: 0
                  constraints: { nullable: false }

  - changeSet:
      id: 002-backfill-comment-thread-roots
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - onError: HALT
        - sqlCheck:
            expectedResult: "1"
            sql: |
              SELECT COUNT(*)
              FROM information_schema.columns
              WHERE table_schema = DATABASE()
                AND table_name = 'image_comments'
                AND column_name = 'root_comment_id'
      changes:
        - sql:
            sql: |
              UPDATE image_comments
              SET root_comment_id = id,
                  depth = 0
              WHERE root_comment_id IS NULL;

  - changeSet:
      id: 003-require-comment-root
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - onError: HALT
        - sqlCheck:
            expectedResult: "1"
            sql: |
              SELECT COUNT(*)
              FROM information_schema.columns
              WHERE table_schema = DATABASE()
                AND table_name = 'image_comments'
                AND column_name = 'root_comment_id'
                AND is_nullable = 'YES'
        - sqlCheck:
            expectedResult: "0"
            sql: SELECT COUNT(*) FROM image_comments WHERE root_comment_id IS NULL
      changes:
        - sql:
            dbms: mysql
            sql: ALTER TABLE image_comments MODIFY root_comment_id varchar(36) NOT NULL;

  - changeSet:
      id: 004-index-comment-thread-roots
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - onError: HALT
        - sqlCheck:
            expectedResult: "0"
            sql: |
              SELECT COUNT(*)
              FROM information_schema.statistics
              WHERE table_schema = DATABASE()
                AND table_name = 'image_comments'
                AND index_name = 'idx_image_comments_image_parent_created'
      changes:
        - createIndex:
            tableName: image_comments
            indexName: idx_image_comments_image_parent_created
            columns:
              - column: { name: image_id }
              - column: { name: parent_comment_id }
              - column: { name: created_at }
              - column: { name: id }

  - changeSet:
      id: 005-index-comment-thread-replies
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - onError: HALT
        - sqlCheck:
            expectedResult: "0"
            sql: |
              SELECT COUNT(*)
              FROM information_schema.statistics
              WHERE table_schema = DATABASE()
                AND table_name = 'image_comments'
                AND index_name = 'idx_image_comments_root_created'
      changes:
        - createIndex:
            tableName: image_comments
            indexName: idx_image_comments_root_created
            columns:
              - column: { name: root_comment_id }
              - column: { name: created_at }
              - column: { name: id }
