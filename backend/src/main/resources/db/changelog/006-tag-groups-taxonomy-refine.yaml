databaseChangeLog:
  - changeSet:
      id: 001-create-tag-groups
      author: codex
      changes:
        - createTable:
            tableName: tag_groups
            columns:
              - column: { name: id, type: varchar(36), constraints: { primaryKey: true, nullable: false } }
              - column: { name: code, type: varchar(64), constraints: { nullable: false, unique: true } }
              - column: { name: name, type: varchar(120), constraints: { nullable: false } }
              - column: { name: sort_order, type: int, defaultValueNumeric: 0, constraints: { nullable: false } }
              - column: { name: enabled, type: boolean, defaultValueBoolean: true, constraints: { nullable: false } }
              - column: { name: created_at, type: datetime(6), constraints: { nullable: false } }
              - column: { name: updated_at, type: datetime(6), constraints: { nullable: false } }
        - insert:
            tableName: tag_groups
            columns:
              - column: { name: id, value: "12000000-0000-0000-0000-000000000001" }
              - column: { name: code, value: "DEFECT" }
              - column: { name: name, value: "瑕疵" }
              - column: { name: sort_order, valueNumeric: 10 }
              - column: { name: enabled, valueBoolean: true }
              - column: { name: created_at, valueDate: "2026-04-25T00:00:00" }
              - column: { name: updated_at, valueDate: "2026-04-25T00:00:00" }
        - addColumn:
            tableName: tags
            columns:
              - column: { name: group_id, type: varchar(36) }
        - createIndex:
            tableName: tags
            indexName: idx_tags_group_order
            columns:
              - column: { name: group_id }
              - column: { name: sort_order }
              - column: { name: name }

  - changeSet:
      id: 002-clean-test-taxonomy-and-migrate-tags
      author: codex
      changes:
        - sql:
            splitStatements: true
            sql: |
              UPDATE tags
              SET group_id = '12000000-0000-0000-0000-000000000001'
              WHERE category_id = '10000000-0000-0000-0000-000000000001';

              DELETE ubt
              FROM upload_batch_tags ubt
              JOIN tags t ON t.id = ubt.tag_id
              JOIN categories c ON c.id = t.category_id
              WHERE c.code IN ('TEST', 'TEST2') OR c.name IN ('测试', '测试2');

              DELETE it
              FROM image_tags it
              JOIN tags t ON t.id = it.tag_id
              JOIN categories c ON c.id = t.category_id
              WHERE c.code IN ('TEST', 'TEST2') OR c.name IN ('测试', '测试2');

              UPDATE upload_batches
              SET category_id = NULL
              WHERE category_id IN (
                SELECT id FROM categories
                WHERE code IN ('TEST', 'TEST2') OR name IN ('测试', '测试2')
              );

              UPDATE images
              SET category_id = NULL
              WHERE category_id IN (
                SELECT id FROM categories
                WHERE code IN ('TEST', 'TEST2') OR name IN ('测试', '测试2')
              );

              DELETE t
              FROM tags t
              JOIN categories c ON c.id = t.category_id
              WHERE c.code IN ('TEST', 'TEST2') OR c.name IN ('测试', '测试2');

              DELETE FROM categories
              WHERE code IN ('TEST', 'TEST2') OR name IN ('测试', '测试2');

              UPDATE tags
              SET group_id = '12000000-0000-0000-0000-000000000001'
              WHERE group_id IS NULL;

  - changeSet:
      id: 003-replace-tag-category-with-group
      author: codex
      preConditions:
        - onFail: HALT
        - onError: HALT
        - sqlCheck:
            expectedResult: "0"
            sql: SELECT COUNT(*) FROM tags WHERE group_id IS NULL
      changes:
        - dropForeignKeyConstraint:
            baseTableName: tags
            constraintName: fk_tags_category
        - dropUniqueConstraint:
            tableName: tags
            constraintName: uk_tags_category_name
        - addNotNullConstraint:
            tableName: tags
            columnName: group_id
            columnDataType: varchar(36)
        - addUniqueConstraint:
            tableName: tags
            columnNames: group_id, name
            constraintName: uk_tags_group_name
        - addForeignKeyConstraint:
            baseTableName: tags
            baseColumnNames: group_id
            constraintName: fk_tags_group
            referencedTableName: tag_groups
            referencedColumnNames: id
            onDelete: RESTRICT
        - dropColumn:
            tableName: tags
            columnName: category_id
