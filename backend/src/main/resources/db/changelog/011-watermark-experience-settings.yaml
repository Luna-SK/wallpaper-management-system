databaseChangeLog:
  - changeSet:
      id: 001-seed-watermark-experience-settings
      author: codex
      changes:
        - sql:
            splitStatements: false
            sql: |
              INSERT INTO system_settings (setting_key, setting_value, updated_at)
              VALUES
                ('watermark.preview.enabled', 'false', CURRENT_TIMESTAMP(6)),
                ('watermark.mode', 'CORNER', CURRENT_TIMESTAMP(6)),
                ('watermark.position', 'BOTTOM_RIGHT', CURRENT_TIMESTAMP(6)),
                ('watermark.opacity_percent', '16', CURRENT_TIMESTAMP(6)),
                ('watermark.tile_density', 'SPARSE', CURRENT_TIMESTAMP(6))
              ON DUPLICATE KEY UPDATE setting_value = setting_value;
