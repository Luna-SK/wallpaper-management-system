databaseChangeLog:
  - changeSet:
      id: 001-add-image-runtime-columns
      author: codex
      changes:
        - addColumn:
            tableName: roles
            columns:
              - column: { name: enabled, type: boolean, defaultValueBoolean: true, constraints: { nullable: false } }
        - addColumn:
            tableName: images
            columns:
              - column: { name: current_version_id, type: varchar(36) }
              - column: { name: deleted_at, type: datetime(6) }

  - changeSet:
      id: 002-create-image-versions
      author: codex
      changes:
        - createTable:
            tableName: image_versions
            columns:
              - column: { name: id, type: varchar(36), constraints: { primaryKey: true, nullable: false } }
              - column: { name: image_id, type: varchar(36), constraints: { nullable: false } }
              - column: { name: version_no, type: int, constraints: { nullable: false } }
              - column: { name: source_version_id, type: varchar(36) }
              - column: { name: operation_type, type: varchar(40), constraints: { nullable: false } }
              - column: { name: original_filename, type: varchar(255), constraints: { nullable: false } }
              - column: { name: sha256, type: char(64), constraints: { nullable: false } }
              - column: { name: mime_type, type: varchar(120), constraints: { nullable: false } }
              - column: { name: size_bytes, type: bigint, constraints: { nullable: false } }
              - column: { name: width, type: int }
              - column: { name: height, type: int }
              - column: { name: bucket, type: varchar(120), constraints: { nullable: false } }
              - column: { name: original_object_key, type: varchar(512), constraints: { nullable: false } }
              - column: { name: thumbnail_object_key, type: varchar(512), constraints: { nullable: false } }
              - column: { name: high_preview_object_key, type: varchar(512), constraints: { nullable: false } }
              - column: { name: standard_preview_object_key, type: varchar(512), constraints: { nullable: false } }
              - column: { name: current_flag, type: boolean, defaultValueBoolean: true, constraints: { nullable: false } }
              - column: { name: created_by, type: varchar(36) }
              - column: { name: created_at, type: datetime(6), constraints: { nullable: false } }
        - addUniqueConstraint:
            tableName: image_versions
            columnNames: image_id, version_no
            constraintName: uk_image_versions_image_version
        - createIndex:
            tableName: image_versions
            indexName: idx_image_versions_image
            columns:
              - column: { name: image_id }

  - changeSet:
      id: 003-create-upload-batches
      author: codex
      changes:
        - createTable:
            tableName: upload_batches
            columns:
              - column: { name: id, type: varchar(36), constraints: { primaryKey: true, nullable: false } }
              - column: { name: status, type: varchar(24), constraints: { nullable: false } }
              - column: { name: total_count, type: int, defaultValueNumeric: 0, constraints: { nullable: false } }
              - column: { name: success_count, type: int, defaultValueNumeric: 0, constraints: { nullable: false } }
              - column: { name: failed_count, type: int, defaultValueNumeric: 0, constraints: { nullable: false } }
              - column: { name: duplicate_count, type: int, defaultValueNumeric: 0, constraints: { nullable: false } }
              - column: { name: progress_percent, type: int, defaultValueNumeric: 0, constraints: { nullable: false } }
              - column: { name: created_by, type: varchar(36) }
              - column: { name: created_at, type: datetime(6), constraints: { nullable: false } }
              - column: { name: updated_at, type: datetime(6), constraints: { nullable: false } }
              - column: { name: finished_at, type: datetime(6) }
        - createTable:
            tableName: upload_batch_items
            columns:
              - column: { name: id, type: varchar(36), constraints: { primaryKey: true, nullable: false } }
              - column: { name: batch_id, type: varchar(36), constraints: { nullable: false } }
              - column: { name: image_id, type: varchar(36) }
              - column: { name: original_filename, type: varchar(255), constraints: { nullable: false } }
              - column: { name: status, type: varchar(24), constraints: { nullable: false } }
              - column: { name: progress_percent, type: int, defaultValueNumeric: 0, constraints: { nullable: false } }
              - column: { name: retry_count, type: int, defaultValueNumeric: 0, constraints: { nullable: false } }
              - column: { name: error_message, type: varchar(1000) }
              - column: { name: created_at, type: datetime(6), constraints: { nullable: false } }
              - column: { name: updated_at, type: datetime(6), constraints: { nullable: false } }
        - createIndex:
            tableName: upload_batch_items
            indexName: idx_upload_batch_items_batch
            columns:
              - column: { name: batch_id }

