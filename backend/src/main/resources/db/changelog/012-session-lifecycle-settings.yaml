databaseChangeLog:
  - changeSet:
      id: 001-add-session-last-activity-column
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - onError: HALT
        - sqlCheck:
            expectedResult: "0"
            sql: |
              SELECT COUNT(*)
              FROM information_schema.columns
              WHERE table_schema = DATABASE()
                AND table_name = 'auth_refresh_tokens'
                AND column_name = 'last_activity_at'
      changes:
        - addColumn:
            tableName: auth_refresh_tokens
            columns:
              - column:
                  name: last_activity_at
                  type: datetime(6)

  - changeSet:
      id: 002-backfill-session-last-activity
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - onError: HALT
        - sqlCheck:
            expectedResult: "1"
            sql: |
              SELECT COUNT(*)
              FROM information_schema.columns
              WHERE table_schema = DATABASE()
                AND table_name = 'auth_refresh_tokens'
                AND column_name = 'last_activity_at'
      changes:
        - sql:
            sql: |
              UPDATE auth_refresh_tokens
              SET last_activity_at = COALESCE(updated_at, created_at, CURRENT_TIMESTAMP(6))
              WHERE last_activity_at IS NULL;

  - changeSet:
      id: 003-require-session-last-activity
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - onError: HALT
        - sqlCheck:
            expectedResult: "1"
            sql: |
              SELECT COUNT(*)
              FROM information_schema.columns
              WHERE table_schema = DATABASE()
                AND table_name = 'auth_refresh_tokens'
                AND column_name = 'last_activity_at'
                AND is_nullable = 'YES'
        - sqlCheck:
            expectedResult: "0"
            sql: SELECT COUNT(*) FROM auth_refresh_tokens WHERE last_activity_at IS NULL
      changes:
        - addNotNullConstraint:
            tableName: auth_refresh_tokens
            columnName: last_activity_at
            columnDataType: datetime(6)

  - changeSet:
      id: 004-index-session-last-activity
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - onError: HALT
        - sqlCheck:
            expectedResult: "0"
            sql: |
              SELECT COUNT(*)
              FROM information_schema.statistics
              WHERE table_schema = DATABASE()
                AND table_name = 'auth_refresh_tokens'
                AND index_name = 'idx_auth_refresh_tokens_last_activity'
      changes:
        - createIndex:
            tableName: auth_refresh_tokens
            indexName: idx_auth_refresh_tokens_last_activity
            columns:
              - column: { name: last_activity_at }

  - changeSet:
      id: 005-seed-session-lifecycle-settings
      author: codex
      changes:
        - sql:
            splitStatements: false
            sql: |
              INSERT INTO system_settings (setting_key, setting_value, updated_at)
              VALUES
                ('session.idle_timeout.enabled', 'true', CURRENT_TIMESTAMP(6)),
                ('session.idle_timeout_minutes', '120', CURRENT_TIMESTAMP(6)),
                ('session.absolute_lifetime.enabled', 'true', CURRENT_TIMESTAMP(6)),
                ('session.absolute_lifetime_days', '7', CURRENT_TIMESTAMP(6))
              ON DUPLICATE KEY UPDATE setting_value = setting_value;
