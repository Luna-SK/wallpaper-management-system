databaseChangeLog:
  - changeSet:
      id: 001-create-upload-batch-tags
      author: codex
      changes:
        - createTable:
            tableName: upload_batch_tags
            columns:
              - column: { name: batch_id, type: varchar(36), constraints: { nullable: false } }
              - column: { name: tag_id, type: varchar(36), constraints: { nullable: false } }
        - addPrimaryKey:
            tableName: upload_batch_tags
            columnNames: batch_id, tag_id
            constraintName: pk_upload_batch_tags
        - sql:
            splitStatements: true
            sql: |
              INSERT IGNORE INTO upload_batch_tags (batch_id, tag_id)
              SELECT upload_batch.id, TRIM(tag_item.tag_id)
              FROM upload_batches upload_batch
              JOIN JSON_TABLE(
                CONCAT('["', REPLACE(upload_batch.tag_ids, ',', '","'), '"]'),
                '$[*]' COLUMNS (tag_id varchar(36) PATH '$')
              ) tag_item
              WHERE COALESCE(upload_batch.tag_ids, '') <> ''
                AND TRIM(tag_item.tag_id) <> '';
        - dropColumn:
            tableName: upload_batches
            columnName: tag_ids
        - createIndex:
            tableName: upload_batch_tags
            indexName: idx_upload_batch_tags_tag
            columns:
              - column: { name: tag_id }

