  - changeSet:
      id: 003-add-foreign-keys
      author: codex
      changes:
        - addForeignKeyConstraint:
            baseTableName: tags
            baseColumnNames: category_id
            constraintName: fk_tags_category
            referencedTableName: categories
            referencedColumnNames: id
            onDelete: RESTRICT
        - addForeignKeyConstraint:
            baseTableName: images
            baseColumnNames: category_id
            constraintName: fk_images_category
            referencedTableName: categories
            referencedColumnNames: id
            onDelete: SET NULL
        - addForeignKeyConstraint:
            baseTableName: image_versions
            baseColumnNames: image_id
            constraintName: fk_image_versions_image
            referencedTableName: images
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: image_tags
            baseColumnNames: image_id
            constraintName: fk_image_tags_image
            referencedTableName: images
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: image_tags
            baseColumnNames: tag_id
            constraintName: fk_image_tags_tag
            referencedTableName: tags
            referencedColumnNames: id
            onDelete: RESTRICT
        - addForeignKeyConstraint:
            baseTableName: upload_batch_items
            baseColumnNames: batch_id
            constraintName: fk_upload_batch_items_batch
            referencedTableName: upload_batches
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: upload_batch_tags
            baseColumnNames: batch_id
            constraintName: fk_upload_batch_tags_batch
            referencedTableName: upload_batches
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: upload_batch_tags
            baseColumnNames: tag_id
            constraintName: fk_upload_batch_tags_tag
            referencedTableName: tags
            referencedColumnNames: id
            onDelete: RESTRICT
        - addForeignKeyConstraint:
            baseTableName: user_roles
            baseColumnNames: user_id
            constraintName: fk_user_roles_user
            referencedTableName: app_users
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: user_roles
            baseColumnNames: role_id
            constraintName: fk_user_roles_role
            referencedTableName: roles
            referencedColumnNames: id
            onDelete: RESTRICT
        - addForeignKeyConstraint:
            baseTableName: role_permissions
