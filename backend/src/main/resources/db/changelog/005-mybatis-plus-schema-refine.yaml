            baseColumnNames: permission_id
            constraintName: fk_role_permissions_permission
            referencedTableName: permissions
            referencedColumnNames: id
            onDelete: RESTRICT

  - changeSet:
      id: 004-drop-empty-image-objects
      author: codex
      preConditions:
        - onFail: HALT
        - onError: HALT
        - tableExists:
            tableName: image_objects
        - sqlCheck:
            expectedResult: "0"
            sql: SELECT COUNT(*) FROM image_objects
      changes:
        - dropTable:
            tableName: image_objects
