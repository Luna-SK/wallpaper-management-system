            columns:
              - column: { name: id, type: varchar(36), constraints: { primaryKey: true, nullable: false } }
              - column: { name: batch_id, type: varchar(36), constraints: { nullable: false } }
              - column: { name: image_id, type: varchar(36) }
              - column: { name: candidate_image_id, type: varchar(36) }
              - column: { name: original_filename, type: varchar(255), constraints: { nullable: false } }
              - column: { name: title, type: varchar(255) }
              - column: { name: status, type: varchar(24), constraints: { nullable: false } }
              - column: { name: progress_percent, type: int, defaultValueNumeric: 0, constraints: { nullable: false } }
              - column: { name: retry_count, type: int, defaultValueNumeric: 0, constraints: { nullable: false } }
              - column: { name: error_message, type: varchar(1000) }
              - column: { name: sha256, type: char(64), defaultValue: "", constraints: { nullable: false } }
              - column: { name: mime_type, type: varchar(120) }
              - column: { name: size_bytes, type: bigint }
              - column: { name: width, type: int }
              - column: { name: height, type: int }
              - column: { name: bucket, type: varchar(120) }
              - column: { name: original_object_key, type: varchar(512) }
              - column: { name: thumbnail_object_key, type: varchar(512) }
              - column: { name: high_preview_object_key, type: varchar(512) }
              - column: { name: standard_preview_object_key, type: varchar(512) }
              - column: { name: created_at, type: datetime(6), constraints: { nullable: false } }
              - column: { name: updated_at, type: datetime(6), constraints: { nullable: false } }
        - createIndex:
            tableName: upload_batch_items
            indexName: idx_upload_batch_items_batch
            columns:
              - column: { name: batch_id }
        - createIndex:
            tableName: upload_batch_items
            indexName: idx_upload_batch_items_status_created
            columns:
              - column: { name: status }
              - column: { name: created_at }
              - column: { name: id }
        - createTable:
            tableName: upload_batch_tags
            columns:
              - column: { name: batch_id, type: varchar(36), constraints: { nullable: false } }
              - column: { name: tag_id, type: varchar(36), constraints: { nullable: false } }
        - addPrimaryKey:
            tableName: upload_batch_tags
            columnNames: batch_id, tag_id
            constraintName: pk_upload_batch_tags
        - createIndex:
            tableName: upload_batch_tags
            indexName: idx_upload_batch_tags_tag
            columns:
