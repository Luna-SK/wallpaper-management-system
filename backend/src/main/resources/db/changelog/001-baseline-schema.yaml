        - addForeignKeyConstraint:
            baseTableName: upload_batch_items
            baseColumnNames: batch_id
            constraintName: fk_upload_batch_items_batch
            referencedTableName: upload_batches
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: upload_batch_tags
            baseColumnNames: batch_id
            constraintName: fk_upload_batch_tags_batch
            referencedTableName: upload_batches
            referencedColumnNames: id
