databaseChangeLog:
  - changeSet:
      id: 001-create-users-and-rbac
      author: wallpaper
      changes:
        - createTable:
            tableName: app_users
            columns:
              - column: { name: id, type: varchar(36), constraints: { primaryKey: true, nullable: false } }
              - column: { name: username, type: varchar(64), constraints: { nullable: false, unique: true } }
              - column: { name: display_name, type: varchar(120), constraints: { nullable: false } }
              - column: { name: email, type: varchar(180) }
              - column: { name: phone, type: varchar(40) }
              - column: { name: password_hash, type: varchar(255), constraints: { nullable: false } }
              - column: { name: avatar_object_key, type: varchar(512) }
              - column: { name: avatar_mime_type, type: varchar(120) }
              - column: { name: avatar_updated_at, type: datetime(6) }
              - column: { name: status, type: varchar(24), defaultValue: ACTIVE, constraints: { nullable: false } }
              - column: { name: created_at, type: datetime(6), constraints: { nullable: false } }
              - column: { name: updated_at, type: datetime(6), constraints: { nullable: false } }
        - createIndex:
            tableName: app_users
            indexName: uk_app_users_email
            unique: true
            columns:
              - column: { name: email }
        - createTable:
            tableName: roles
            columns:
              - column: { name: id, type: varchar(36), constraints: { primaryKey: true, nullable: false } }
              - column: { name: code, type: varchar(64), constraints: { nullable: false, unique: true } }
              - column: { name: name, type: varchar(120), constraints: { nullable: false } }
              - column: { name: description, type: varchar(255) }
              - column: { name: enabled, type: boolean, defaultValueBoolean: true, constraints: { nullable: false } }
              - column: { name: created_at, type: datetime(6), constraints: { nullable: false } }
              - column: { name: updated_at, type: datetime(6), constraints: { nullable: false } }
        - createTable:
            tableName: permissions
            columns:
              - column: { name: id, type: varchar(36), constraints: { primaryKey: true, nullable: false } }
              - column: { name: code, type: varchar(120), constraints: { nullable: false, unique: true } }
              - column: { name: name, type: varchar(120), constraints: { nullable: false } }
              - column: { name: resource, type: varchar(120), constraints: { nullable: false } }
              - column: { name: action, type: varchar(40), constraints: { nullable: false } }
        - createTable:
            tableName: user_roles
            columns:
              - column: { name: user_id, type: varchar(36), constraints: { nullable: false } }
              - column: { name: role_id, type: varchar(36), constraints: { nullable: false } }
        - addPrimaryKey:
            tableName: user_roles
            columnNames: user_id, role_id
            constraintName: pk_user_roles
        - createIndex:
            tableName: user_roles
            indexName: idx_user_roles_role_user
            columns:
              - column: { name: role_id }
              - column: { name: user_id }
        - createTable:
            tableName: role_permissions
            columns:
              - column: { name: role_id, type: varchar(36), constraints: { nullable: false } }
              - column: { name: permission_id, type: varchar(36), constraints: { nullable: false } }
        - addPrimaryKey:
            tableName: role_permissions
            columnNames: role_id, permission_id
            constraintName: pk_role_permissions
        - createIndex:
            tableName: role_permissions
            indexName: idx_role_permissions_permission_role
            columns:
              - column: { name: permission_id }
              - column: { name: role_id }
        - addForeignKeyConstraint:
            baseTableName: user_roles
            baseColumnNames: user_id
            constraintName: fk_user_roles_user
            referencedTableName: app_users
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: user_roles
            baseColumnNames: role_id
            constraintName: fk_user_roles_role
            referencedTableName: roles
            referencedColumnNames: id
            onDelete: RESTRICT
        - addForeignKeyConstraint:
            baseTableName: role_permissions
            baseColumnNames: role_id
            constraintName: fk_role_permissions_role
            referencedTableName: roles
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: role_permissions
            baseColumnNames: permission_id
            constraintName: fk_role_permissions_permission
            referencedTableName: permissions
            referencedColumnNames: id
            onDelete: RESTRICT

  - changeSet:
      id: 002-create-taxonomy
      author: wallpaper
      changes:
        - createTable:
            tableName: categories
            columns:
              - column: { name: id, type: varchar(36), constraints: { primaryKey: true, nullable: false } }
              - column: { name: code, type: varchar(64), constraints: { nullable: false, unique: true } }
              - column: { name: name, type: varchar(120), constraints: { nullable: false } }
              - column: { name: sort_order, type: int, defaultValueNumeric: 0, constraints: { nullable: false } }
              - column: { name: enabled, type: boolean, defaultValueBoolean: true, constraints: { nullable: false } }
              - column: { name: created_at, type: datetime(6), constraints: { nullable: false } }
              - column: { name: updated_at, type: datetime(6), constraints: { nullable: false } }
        - createTable:
            tableName: tag_groups
            columns:
              - column: { name: id, type: varchar(36), constraints: { primaryKey: true, nullable: false } }
              - column: { name: code, type: varchar(64), constraints: { nullable: false, unique: true } }
              - column: { name: name, type: varchar(120), constraints: { nullable: false } }
              - column: { name: sort_order, type: int, defaultValueNumeric: 0, constraints: { nullable: false } }
              - column: { name: enabled, type: boolean, defaultValueBoolean: true, constraints: { nullable: false } }
              - column: { name: created_at, type: datetime(6), constraints: { nullable: false } }
              - column: { name: updated_at, type: datetime(6), constraints: { nullable: false } }
        - createTable:
            tableName: tags
            columns:
              - column: { name: id, type: varchar(36), constraints: { primaryKey: true, nullable: false } }
              - column: { name: group_id, type: varchar(36), constraints: { nullable: false } }
              - column: { name: name, type: varchar(120), constraints: { nullable: false } }
              - column: { name: sort_order, type: int, defaultValueNumeric: 0, constraints: { nullable: false } }
              - column: { name: enabled, type: boolean, defaultValueBoolean: true, constraints: { nullable: false } }
              - column: { name: created_at, type: datetime(6), constraints: { nullable: false } }
              - column: { name: updated_at, type: datetime(6), constraints: { nullable: false } }
        - addUniqueConstraint:
            tableName: tags
            columnNames: group_id, name
            constraintName: uk_tags_group_name
        - createIndex:
            tableName: tags
            indexName: idx_tags_group_order
            columns:
              - column: { name: group_id }
              - column: { name: sort_order }
              - column: { name: name }
        - addForeignKeyConstraint:
            baseTableName: tags
            baseColumnNames: group_id
            constraintName: fk_tags_group
            referencedTableName: tag_groups
            referencedColumnNames: id
            onDelete: RESTRICT

  - changeSet:
      id: 003-create-images-and-versions
      author: wallpaper
      changes:
        - createTable:
            tableName: images
            columns:
              - column: { name: id, type: varchar(36), constraints: { primaryKey: true, nullable: false } }
              - column: { name: title, type: varchar(255), constraints: { nullable: false } }
              - column: { name: title_sort_key, type: varchar(512) }
              - column: { name: original_filename, type: varchar(255), constraints: { nullable: false } }
              - column: { name: sha256, type: char(64), constraints: { nullable: false } }
              - column: { name: mime_type, type: varchar(120), constraints: { nullable: false } }
              - column: { name: size_bytes, type: bigint, constraints: { nullable: false } }
              - column: { name: width, type: int }
              - column: { name: height, type: int }
              - column: { name: uploader_id, type: varchar(36) }
              - column: { name: source_path, type: varchar(512) }
              - column: { name: category_id, type: varchar(36) }
              - column: { name: current_version_id, type: varchar(36) }
              - column: { name: status, type: varchar(24), defaultValue: ACTIVE, constraints: { nullable: false } }
              - column: { name: deleted_at, type: datetime(6) }
              - column: { name: view_count, type: bigint, defaultValueNumeric: 0, constraints: { nullable: false } }
              - column: { name: download_count, type: bigint, defaultValueNumeric: 0, constraints: { nullable: false } }
              - column: { name: created_at, type: datetime(6), constraints: { nullable: false } }
              - column: { name: updated_at, type: datetime(6), constraints: { nullable: false } }
        - createIndex:
            tableName: images
            indexName: idx_images_sha256
            columns:
              - column: { name: sha256 }
        - createIndex:
            tableName: images
            indexName: idx_images_title_sort_key
            columns:
              - column: { name: title_sort_key }
        - createIndex:
            tableName: images
            indexName: idx_images_created_at
            columns:
              - column: { name: created_at }
        - createIndex:
            tableName: images
            indexName: idx_images_category
            columns:
              - column: { name: category_id }
        - createIndex:
            tableName: images
            indexName: idx_images_status_created
            columns:
              - column: { name: status }
              - column: { name: created_at }
              - column: { name: id }
        - createIndex:
            tableName: images
            indexName: idx_images_status_deleted
            columns:
              - column: { name: status }
              - column: { name: deleted_at }
        - createIndex:
            tableName: images
            indexName: idx_images_status_views_created
            columns:
              - column: { name: status }
              - column: { name: view_count }
              - column: { name: created_at }
        - createIndex:
            tableName: images
            indexName: idx_images_status_downloads_created
            columns:
              - column: { name: status }
              - column: { name: download_count }
              - column: { name: created_at }
        - addForeignKeyConstraint:
            baseTableName: images
            baseColumnNames: category_id
            constraintName: fk_images_category
            referencedTableName: categories
            referencedColumnNames: id
            onDelete: SET NULL
        - createTable:
            tableName: image_versions
            columns:
              - column: { name: id, type: varchar(36), constraints: { primaryKey: true, nullable: false } }
              - column: { name: image_id, type: varchar(36), constraints: { nullable: false } }
              - column: { name: version_no, type: int, constraints: { nullable: false } }
              - column: { name: source_version_id, type: varchar(36) }
              - column: { name: operation_type, type: varchar(40), constraints: { nullable: false } }
              - column: { name: original_filename, type: varchar(255), constraints: { nullable: false } }
              - column: { name: sha256, type: char(64), constraints: { nullable: false } }
              - column: { name: mime_type, type: varchar(120), constraints: { nullable: false } }
              - column: { name: size_bytes, type: bigint, constraints: { nullable: false } }
              - column: { name: width, type: int }
              - column: { name: height, type: int }
              - column: { name: bucket, type: varchar(120), constraints: { nullable: false } }
              - column: { name: original_object_key, type: varchar(512), constraints: { nullable: false } }
              - column: { name: thumbnail_object_key, type: varchar(512), constraints: { nullable: false } }
              - column: { name: high_preview_object_key, type: varchar(512), constraints: { nullable: false } }
              - column: { name: standard_preview_object_key, type: varchar(512), constraints: { nullable: false } }
              - column: { name: current_flag, type: boolean, defaultValueBoolean: true, constraints: { nullable: false } }
              - column: { name: created_by, type: varchar(36) }
              - column: { name: created_at, type: datetime(6), constraints: { nullable: false } }
        - addUniqueConstraint:
            tableName: image_versions
            columnNames: image_id, version_no
            constraintName: uk_image_versions_image_version
        - createIndex:
            tableName: image_versions
            indexName: idx_image_versions_image
            columns:
              - column: { name: image_id }
        - addForeignKeyConstraint:
            baseTableName: image_versions
            baseColumnNames: image_id
            constraintName: fk_image_versions_image
            referencedTableName: images
            referencedColumnNames: id
            onDelete: CASCADE
        - createTable:
            tableName: image_tags
            columns:
              - column: { name: image_id, type: varchar(36), constraints: { nullable: false } }
              - column: { name: tag_id, type: varchar(36), constraints: { nullable: false } }
        - addPrimaryKey:
            tableName: image_tags
            columnNames: image_id, tag_id
            constraintName: pk_image_tags
        - createIndex:
            tableName: image_tags
            indexName: idx_image_tags_tag_image
            columns:
              - column: { name: tag_id }
              - column: { name: image_id }
        - addForeignKeyConstraint:
            baseTableName: image_tags
            baseColumnNames: image_id
            constraintName: fk_image_tags_image
            referencedTableName: images
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: image_tags
            baseColumnNames: tag_id
            constraintName: fk_image_tags_tag
            referencedTableName: tags
            referencedColumnNames: id
            onDelete: RESTRICT

  - changeSet:
      id: 004-create-upload-sessions
      author: wallpaper
      changes:
        - createTable:
