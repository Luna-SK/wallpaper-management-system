databaseChangeLog:
  - changeSet:
      id: 001-migrate-images-to-single-category
      author: codex
      changes:
        - addColumn:
            tableName: images
            columns:
              - column: { name: category_id, type: varchar(36) }
        - sql:
            splitStatements: true
            sql: |
              UPDATE images img
              LEFT JOIN (
                SELECT image_id, MIN(category_id) AS category_id
                FROM image_categories
                GROUP BY image_id
              ) image_category ON image_category.image_id = img.id
              SET img.category_id = image_category.category_id;
        - createIndex:
            tableName: images
            indexName: idx_images_category
            columns:
              - column: { name: category_id }
        - dropTable:
            tableName: image_categories
