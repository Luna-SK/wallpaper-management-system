databaseChangeLog:
  - changeSet:
      id: 001-seed-watermark-text-setting
      author: codex
      changes:
        - sql:
            splitStatements: false
            sql: |
              INSERT INTO system_settings (setting_key, setting_value, updated_at)
              VALUES ('watermark.text', '仅供授权使用', CURRENT_TIMESTAMP(6))
