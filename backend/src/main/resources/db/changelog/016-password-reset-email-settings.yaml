databaseChangeLog:
  - changeSet:
      id: 001-seed-password-reset-email-settings
      author: codex
      changes:
        - sql:
            splitStatements: false
            sql: |
              INSERT INTO system_settings (setting_key, setting_value, updated_at)
              VALUES ('password_reset.email.enabled', 'true', CURRENT_TIMESTAMP(6))
              ON DUPLICATE KEY UPDATE setting_value = setting_value;
