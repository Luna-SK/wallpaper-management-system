databaseChangeLog:
  - changeSet:
      id: 001-add-user-avatar-fields
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - onError: HALT
        - sqlCheck:
            expectedResult: "0"
            sql: |
              SELECT COUNT(*)
              FROM information_schema.columns
              WHERE table_schema = DATABASE()
                AND table_name = 'app_users'
                AND column_name = 'avatar_object_key'
      changes:
        - addColumn:
            tableName: app_users
            columns:
              - column: { name: avatar_object_key, type: varchar(512) }
              - column: { name: avatar_mime_type, type: varchar(120) }
              - column: { name: avatar_updated_at, type: datetime(6) }
