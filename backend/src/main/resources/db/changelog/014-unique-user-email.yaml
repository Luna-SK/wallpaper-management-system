databaseChangeLog:
  - changeSet:
      id: 001-normalize-user-emails
      author: codex
      preConditions:
        - onFail: HALT
        - onError: HALT
        - sqlCheck:
            expectedResult: "0"
            sql: |
              SELECT COUNT(*)
              FROM (
                SELECT LOWER(TRIM(email)) AS normalized_email
                FROM app_users
                WHERE email IS NOT NULL AND TRIM(email) <> ''
                GROUP BY LOWER(TRIM(email))
                HAVING COUNT(*) > 1
              ) duplicated_emails
      changes:
        - sql:
            sql: |
              UPDATE app_users
              SET email = NULL
              WHERE email IS NOT NULL AND TRIM(email) = '';
        - sql:
            sql: |
              UPDATE app_users
              SET email = LOWER(TRIM(email))
              WHERE email IS NOT NULL;

  - changeSet:
      id: 002-add-unique-user-email-index
      author: codex
      changes:
        - createIndex:
            tableName: app_users
            indexName: uk_app_users_email
            unique: true
            columns:
              - column:
                  name: email
