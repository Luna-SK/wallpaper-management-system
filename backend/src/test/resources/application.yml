server:
  port: 0

spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 500MB

app:
  security:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173,http://localhost
    development-token: test-development-token
    development-token-enabled: false
    jwt-secret: test-jwt-secret-for-wallpaper-auth-rbac-suite
    access-token-ttl: 15m
    refresh-token-ttl: 7d
  mail:
    enabled: true
    from: no-reply@example.test
    frontend-base-url: http://localhost:5173
    password-reset-token-ttl: 30m
  storage:
    endpoint: http://localhost:19010
    region: cn-east-1
    access-key: test-access-key
    secret-key: test-secret-key
    bucket-original: wallpaper-original
    bucket-preview: wallpaper-preview
    bucket-thumbnail: wallpaper-thumbnail
    bucket-watermark: wallpaper-watermark
    bucket-audit: wallpaper-audit
