services:
  mysql:
    ports:
      - "${MYSQL_PORT:-13316}:3306"

  redis:
    ports:
      - "${REDIS_PORT:-16389}:6379"

  rustfs:
    ports:
      - "${RUSTFS_API_PORT:-19010}:9000"
      - "${RUSTFS_CONSOLE_PORT:-19011}:9001"

  mailpit:
    image: axllent/mailpit
    restart: unless-stopped
    profiles:
      - local-mail
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_WEB_PORT:-8025}:8025"

  backend:
    ports:
      - "${BACKEND_PORT:-18090}:18090"

  frontend:
    ports:
      - "${FRONTEND_PORT:-80}:80"
