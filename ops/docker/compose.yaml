services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-13316}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u${DB_USERNAME} -p${DB_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-16389}:6379"
    volumes:
      - redis-data:/data

  rustfs:
    image: rustfs/rustfs:1.0.0-alpha.98
    environment:
      RUSTFS_ROOT_USER: ${RUSTFS_ACCESS_KEY}
      RUSTFS_ROOT_PASSWORD: ${RUSTFS_SECRET_KEY}
    ports:
      - "${RUSTFS_API_PORT:-19010}:9000"
      - "${RUSTFS_CONSOLE_PORT:-19011}:9001"
    volumes:
      - rustfs-data:/data

  backend:
    build:
      context: ../../backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rustfs:
        condition: service_started
    environment:
      DB_URL: jdbc:mysql://mysql:3306/${DB_NAME}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RUSTFS_ENDPOINT: http://rustfs:9000
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY}
      RUSTFS_BUCKET_AUDIT: ${RUSTFS_BUCKET_AUDIT}
      APP_ALLOWED_ORIGINS: ${APP_ALLOWED_ORIGINS}
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build:
      context: ../../frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"

  backup:
    image: mysql:8.4
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./backup:/backup
      - backup-data:/data
    entrypoint: ["/bin/sh", "/backup/backup.sh"]
    profiles:
      - backup

volumes:
  mysql-data:
  redis-data:
  rustfs-data:
  backup-data:
