services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u${DB_USERNAME} -p${DB_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command: ["sh", "-c", "if [ -n \"$${REDIS_PASSWORD}\" ]; then exec redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\"; else exec redis-server --appendonly yes; fi"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG; else redis-cli ping | grep PONG; fi"]
      interval: 10s
      timeout: 5s
      retries: 12

  rustfs:
    image: rustfs/rustfs:1.0.0-alpha.98
    restart: unless-stopped
    environment:
      RUSTFS_ROOT_USER: ${RUSTFS_ACCESS_KEY}
      RUSTFS_ROOT_PASSWORD: ${RUSTFS_SECRET_KEY}
    volumes:
      - rustfs-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -S --spider http://127.0.0.1:9000/minio/health/live 2>&1 | grep -Eq 'HTTP/[0-9.]+ (200|403)'"]
      interval: 10s
      timeout: 5s
      retries: 18

  rustfs-init:
    image: minio/mc:latest
    depends_on:
      rustfs:
        condition: service_healthy
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY}
      RUSTFS_BUCKET_ORIGINAL: ${RUSTFS_BUCKET_ORIGINAL:-wallpaper-original}
      RUSTFS_BUCKET_PREVIEW: ${RUSTFS_BUCKET_PREVIEW:-wallpaper-preview}
      RUSTFS_BUCKET_THUMBNAIL: ${RUSTFS_BUCKET_THUMBNAIL:-wallpaper-thumbnail}
      RUSTFS_BUCKET_WATERMARK: ${RUSTFS_BUCKET_WATERMARK:-wallpaper-watermark}
      RUSTFS_BUCKET_AUDIT: ${RUSTFS_BUCKET_AUDIT:-wallpaper-audit}
    entrypoint: ["/bin/sh", "-c"]
    command: >
      set -eu;
      until mc alias set rustfs http://rustfs:9000 "$${RUSTFS_ACCESS_KEY}" "$${RUSTFS_SECRET_KEY}" >/dev/null 2>&1; do
        sleep 2;
      done;
      for bucket in "$${RUSTFS_BUCKET_ORIGINAL}" "$${RUSTFS_BUCKET_PREVIEW}" "$${RUSTFS_BUCKET_THUMBNAIL}" "$${RUSTFS_BUCKET_WATERMARK}" "$${RUSTFS_BUCKET_AUDIT}"; do
        if [ -n "$$bucket" ]; then
          mc mb --ignore-existing "rustfs/$$bucket";
        fi;
      done

  backend:
    image: ${BACKEND_IMAGE:-wallpaper/backend:${IMAGE_TAG:-local}}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      SERVER_PORT: 18090
      APP_BOOTSTRAP_ADMIN_PASSWORD: ${APP_BOOTSTRAP_ADMIN_PASSWORD:-}
      APP_BOOTSTRAP_DEMO_USERS_ENABLED: ${APP_BOOTSTRAP_DEMO_USERS_ENABLED:-true}
      APP_ALLOWED_ORIGINS: ${APP_ALLOWED_ORIGINS}
      APP_SECURITY_DEVELOPMENT_TOKEN: ${APP_SECURITY_DEVELOPMENT_TOKEN:-}
      APP_SECURITY_DEVELOPMENT_TOKEN_ENABLED: ${APP_SECURITY_DEVELOPMENT_TOKEN_ENABLED:-false}
      APP_SECURITY_JWT_SECRET: ${APP_SECURITY_JWT_SECRET}
      APP_SECURITY_ACCESS_TOKEN_TTL: ${APP_SECURITY_ACCESS_TOKEN_TTL:-15m}
      APP_SECURITY_REFRESH_TOKEN_TTL: ${APP_SECURITY_REFRESH_TOKEN_TTL:-7d}
      APP_MAIL_ENABLED: ${APP_MAIL_ENABLED:-false}
      APP_MAIL_HOST: ${APP_MAIL_HOST:-}
      APP_MAIL_PORT: ${APP_MAIL_PORT:-25}
      APP_MAIL_USERNAME: ${APP_MAIL_USERNAME:-}
      APP_MAIL_PASSWORD: ${APP_MAIL_PASSWORD:-}
      APP_MAIL_SMTP_AUTH: ${APP_MAIL_SMTP_AUTH:-false}
      APP_MAIL_SMTP_STARTTLS: ${APP_MAIL_SMTP_STARTTLS:-false}
      APP_MAIL_SMTP_SSL: ${APP_MAIL_SMTP_SSL:-false}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-no-reply@example.local}
      APP_MAIL_FRONTEND_BASE_URL: ${APP_MAIL_FRONTEND_BASE_URL:-http://localhost}
      APP_MAIL_PASSWORD_RESET_TOKEN_TTL: ${APP_MAIL_PASSWORD_RESET_TOKEN_TTL:-30m}
      UPLOAD_MAX_FILE_SIZE: ${UPLOAD_MAX_FILE_SIZE:-50MB}
      UPLOAD_MAX_REQUEST_SIZE: ${UPLOAD_MAX_REQUEST_SIZE:-500MB}
      RUSTFS_ENDPOINT: http://rustfs:9000
      RUSTFS_REGION: ${RUSTFS_REGION:-cn-east-1}
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY}
      RUSTFS_BUCKET_ORIGINAL: ${RUSTFS_BUCKET_ORIGINAL:-wallpaper-original}
      RUSTFS_BUCKET_PREVIEW: ${RUSTFS_BUCKET_PREVIEW:-wallpaper-preview}
      RUSTFS_BUCKET_THUMBNAIL: ${RUSTFS_BUCKET_THUMBNAIL:-wallpaper-thumbnail}
      RUSTFS_BUCKET_WATERMARK: ${RUSTFS_BUCKET_WATERMARK:-wallpaper-watermark}
      RUSTFS_BUCKET_AUDIT: ${RUSTFS_BUCKET_AUDIT}
    expose:
      - "18090"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:18090/actuator/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s

  frontend:
    image: ${FRONTEND_IMAGE:-wallpaper/frontend:${IMAGE_TAG:-local}}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12

  backup:
    image: mysql:8.4
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./backup:/backup
      - backup-data:/data
    entrypoint: ["/bin/sh", "/backup/backup.sh"]
    profiles:
      - backup

volumes:
  mysql-data:
  redis-data:
  rustfs-data:
  backup-data:
