services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-13316}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u${DB_USERNAME} -p${DB_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-16389}:6379"
    volumes:
      - redis-data:/data

  rustfs:
    image: rustfs/rustfs:1.0.0-alpha.98
    environment:
      RUSTFS_ROOT_USER: ${RUSTFS_ACCESS_KEY}
      RUSTFS_ROOT_PASSWORD: ${RUSTFS_SECRET_KEY}
    ports:
      - "${RUSTFS_API_PORT:-19010}:9000"
      - "${RUSTFS_CONSOLE_PORT:-19011}:9001"
    volumes:
      - rustfs-data:/data

  mailpit:
    image: axllent/mailpit
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_WEB_PORT:-8025}:8025"

  backend:
    build:
      context: ../../backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rustfs:
        condition: service_started
      mailpit:
        condition: service_started
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      SERVER_PORT: ${SERVER_PORT}
      APP_ALLOWED_ORIGINS: ${APP_ALLOWED_ORIGINS}
      APP_SECURITY_DEVELOPMENT_TOKEN: ${APP_SECURITY_DEVELOPMENT_TOKEN:-}
      APP_SECURITY_DEVELOPMENT_TOKEN_ENABLED: ${APP_SECURITY_DEVELOPMENT_TOKEN_ENABLED:-false}
      APP_SECURITY_JWT_SECRET: ${APP_SECURITY_JWT_SECRET}
      APP_SECURITY_ACCESS_TOKEN_TTL: ${APP_SECURITY_ACCESS_TOKEN_TTL:-15m}
      APP_SECURITY_REFRESH_TOKEN_TTL: ${APP_SECURITY_REFRESH_TOKEN_TTL:-7d}
      APP_MAIL_ENABLED: ${APP_MAIL_ENABLED:-true}
      APP_MAIL_HOST: ${APP_MAIL_HOST:-mailpit}
      APP_MAIL_PORT: ${APP_MAIL_PORT:-1025}
      APP_MAIL_USERNAME: ${APP_MAIL_USERNAME:-}
      APP_MAIL_PASSWORD: ${APP_MAIL_PASSWORD:-}
      APP_MAIL_SMTP_AUTH: ${APP_MAIL_SMTP_AUTH:-false}
      APP_MAIL_SMTP_STARTTLS: ${APP_MAIL_SMTP_STARTTLS:-false}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-no-reply@example.local}
      APP_MAIL_FRONTEND_BASE_URL: ${APP_MAIL_FRONTEND_BASE_URL:-http://localhost}
      APP_MAIL_PASSWORD_RESET_TOKEN_TTL: ${APP_MAIL_PASSWORD_RESET_TOKEN_TTL:-30m}
      UPLOAD_MAX_FILE_SIZE: ${UPLOAD_MAX_FILE_SIZE:-50MB}
      UPLOAD_MAX_REQUEST_SIZE: ${UPLOAD_MAX_REQUEST_SIZE:-500MB}
      RUSTFS_ENDPOINT: http://rustfs:9000
      RUSTFS_REGION: ${RUSTFS_REGION:-cn-east-1}
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY}
      RUSTFS_BUCKET_ORIGINAL: ${RUSTFS_BUCKET_ORIGINAL:-wallpaper-original}
      RUSTFS_BUCKET_PREVIEW: ${RUSTFS_BUCKET_PREVIEW:-wallpaper-preview}
      RUSTFS_BUCKET_THUMBNAIL: ${RUSTFS_BUCKET_THUMBNAIL:-wallpaper-thumbnail}
      RUSTFS_BUCKET_WATERMARK: ${RUSTFS_BUCKET_WATERMARK:-wallpaper-watermark}
      RUSTFS_BUCKET_AUDIT: ${RUSTFS_BUCKET_AUDIT}
    ports:
      - "${BACKEND_PORT:-18090}:${SERVER_PORT:-18090}"

  frontend:
    build:
      context: ../../frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"

  backup:
    image: mysql:8.4
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./backup:/backup
      - backup-data:/data
    entrypoint: ["/bin/sh", "/backup/backup.sh"]
    profiles:
      - backup

volumes:
  mysql-data:
  redis-data:
  rustfs-data:
  backup-data:
